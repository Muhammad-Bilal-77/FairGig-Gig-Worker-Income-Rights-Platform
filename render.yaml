services:
  # -- Auth Service -----------------------------------------
  - type: web
    name: fairgig-auth
    runtime: docker
    dockerContext: .
    dockerfilePath: services/auth-service/Dockerfile
    plan: free
    envVars:
      - key: AUTH_PORT
        value: 4001
      - key: PORT
        value: 4001
      - key: NODE_ENV
        value: production
      - key: AUTH_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://fairgig-frontend.onrender.com

  # -- Earnings Service -------------------------------------
  - type: web
    name: fairgig-earnings
    runtime: docker
    dockerContext: .
    dockerfilePath: services/earnings-service/Dockerfile
    plan: free
    envVars:
      - key: EARNINGS_PORT
        value: 4002
      - key: PORT
        value: 4002
      - key: NODE_ENV
        value: production
      - key: EARNINGS_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: READONLY_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        fromService:
          type: web
          name: fairgig-auth
          envVarKey: JWT_ACCESS_SECRET
      - key: ANOMALY_SERVICE_URL
        fromService:
          type: web
          name: fairgig-anomaly
          property: hostport

  # -- Anomaly Service --------------------------------------
  - type: web
    name: fairgig-anomaly
    runtime: docker
    dockerContext: .
    dockerfilePath: services/anomaly-service/Dockerfile
    plan: free
    envVars:
      - key: ANOMALY_PORT
        value: 4003
      - key: PORT
        value: 4003
      - key: NODE_ENV
        value: production
      - key: READONLY_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        fromService:
          type: web
          name: fairgig-auth
          envVarKey: JWT_ACCESS_SECRET

  # -- Grievance Service ------------------------------------
  - type: web
    name: fairgig-grievance
    runtime: docker
    dockerContext: .
    dockerfilePath: services/grievance-service/Dockerfile
    plan: free
    envVars:
      - key: GRIEVANCE_PORT
        value: 4004
      - key: PORT
        value: 4004
      - key: NODE_ENV
        value: production
      - key: GRIEVANCE_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        fromService:
          type: web
          name: fairgig-auth
          envVarKey: JWT_ACCESS_SECRET

  # -- Analytics Service ------------------------------------
  - type: web
    name: fairgig-analytics
    runtime: docker
    dockerContext: .
    dockerfilePath: services/analytics-service/Dockerfile
    plan: free
    envVars:
      - key: ANALYTICS_PORT
        value: 4005
      - key: PORT
        value: 4005
      - key: NODE_ENV
        value: production
      - key: ANALYTICS_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: READONLY_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        fromService:
          type: web
          name: fairgig-auth
          envVarKey: JWT_ACCESS_SECRET

  # -- Certificate Service ----------------------------------
  - type: web
    name: fairgig-certificate
    runtime: docker
    dockerContext: .
    dockerfilePath: services/certificate-service/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 4006
      - key: NODE_ENV
        value: production
      - key: CERTIFICATE_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: READONLY_DB_URL
        fromDatabase:
          name: fairgig-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        fromService:
          type: web
          name: fairgig-auth
          envVarKey: JWT_ACCESS_SECRET
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: fairgig-auth
          property: hostport

  # -- Frontend (Static Site) ------------------------------
  - type: static
    name: fairgig-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fairgig-auth
          property: host
      - key: VITE_EARNINGS_API_URL
        fromService:
          type: web
          name: fairgig-earnings
          property: host
      - key: VITE_ANOMALY_API_URL
        fromService:
          type: web
          name: fairgig-anomaly
          property: host
      - key: VITE_GRIEVANCE_API_URL
        fromService:
          type: web
          name: fairgig-grievance
          property: host
      - key: VITE_ANALYTICS_API_URL
        fromService:
          type: web
          name: fairgig-analytics
          property: host
      - key: VITE_CERTIFICATE_API_URL
        fromService:
          type: web
          name: fairgig-certificate
          property: host

databases:
  - name: fairgig-db
    plan: free
    databaseName: fairgig
    user: fairgig_admin
    ipAllowList: []
