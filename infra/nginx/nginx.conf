# Why Nginx as gateway:
# 1. Single entry point — frontend only needs one base URL
# 2. JWT validation at gateway level — services trust X-User-Role header
# 3. Rate limiting in one place
# 4. CORS headers in one place
# 5. SSL termination point (if HTTPS added later)

events {
  worker_connections 1024;
}

http {

  # Rate limiting zones
  # Why separate zones: different limits for different endpoint types
  limit_req_zone $binary_remote_addr
    zone=auth_limit:10m rate=10r/m;
  limit_req_zone $binary_remote_addr
    zone=api_limit:10m  rate=100r/m;
  limit_req_zone $binary_remote_addr
    zone=upload_limit:10m rate=20r/m;

  # Upstream services (running on host machine, not in Docker)
  # host.docker.internal resolves to host machine from inside Docker
  upstream auth_svc       { server host.docker.internal:4001; }
  upstream earnings_svc   { server host.docker.internal:4002; }
  upstream anomaly_svc    { server host.docker.internal:4003; }
  upstream grievance_svc  { server host.docker.internal:4004; }
  upstream analytics_svc  { server host.docker.internal:4005; }
  upstream certificate_svc { server host.docker.internal:4006; }
  upstream frontend_svc   { server host.docker.internal:8081; }

  server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Security headers on every response
    add_header X-Frame-Options         "DENY"            always;
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin"   always;

    # CORS — allow any origin (required for ngrok free tier URLs)
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Request-ID" always;

    # Handle preflight OPTIONS requests
    if ($request_method = OPTIONS) {
      return 204;
    }

    # ── Gateway health check ──────────────────────────
    location = /health {
      return 200 '{"status":"ok","gateway":"nginx"}';
      add_header Content-Type application/json;
    }

    # ── Auth service ──────────────────────────────────
    # No JWT validation here — these are login/register endpoints
    location /api/auth {
      limit_req zone=auth_limit burst=5 nodelay;
      proxy_pass http://auth_svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID      $request_id;
      proxy_read_timeout 30s;
    }

    # ── Earnings service ──────────────────────────────
    location /api/earnings {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://earnings_svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID      $request_id;
      # Larger body size for screenshot uploads (5MB)
      client_max_body_size 5m;
      proxy_read_timeout 60s;
    }

    # ── Anomaly service ───────────────────────────────
    location /api/anomaly {
      limit_req zone=api_limit burst=10 nodelay;
      proxy_pass http://anomaly_svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID      $request_id;
      # Anomaly analysis can take a few seconds
      proxy_read_timeout 30s;
    }

    # ── Grievance service ─────────────────────────────
    location /api/grievance {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://grievance_svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID      $request_id;
    }

    # ── Analytics service ─────────────────────────────
    location /api/analytics {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://analytics_svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID      $request_id;
    }

    # ── Certificate service ───────────────────────────
    location /api/certificates {
      limit_req zone=api_limit burst=5 nodelay;
      proxy_pass http://certificate_svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID      $request_id;
    }

    # ── Frontend ──────────────────────────────────────
    location / {
      proxy_pass http://frontend_svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
    }
  }
}
