global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:4001']
    metrics_path: '/metrics'

  - job_name: 'earnings-service'
    static_configs:
      - targets: ['earnings-service:4002']
    metrics_path: '/metrics'

  - job_name: 'anomaly-service'
    static_configs:
      - targets: ['anomaly-service:4003']
    metrics_path: '/metrics'

  - job_name: 'grievance-service'
    static_configs:
      - targets: ['grievance-service:4004']
    metrics_path: '/metrics'

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:4005']
    metrics_path: '/metrics'

  - job_name: 'certificate-service'
    static_configs:
      - targets: ['certificate-service:4006']
    metrics_path: '/metrics'
