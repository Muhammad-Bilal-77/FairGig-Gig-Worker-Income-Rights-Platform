version: '3.9'

networks:
  fairgig-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fairgig-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fairgig_admin
      POSTGRES_PASSWORD: fairgig_admin_secret_2026
      POSTGRES_DB: fairgig
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - fairgig-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairgig_admin -d fairgig"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fairgig-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fairgig-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Nginx gateway ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fairgig-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - fairgig-net
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Prometheus ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: fairgig-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - fairgig-net

  # ── Grafana ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: fairgig-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3010:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana:/etc/grafana/provisioning:ro
    networks:
      - fairgig-net
    depends_on:
      - prometheus

  # ── Auth Service ───────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: fairgig-auth-service
    restart: unless-stopped
    environment:
      AUTH_DB_URL: postgresql://auth_svc:auth_svc_secret_2026@postgres:5432/fairgig
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me}
      AUTH_PORT: ${AUTH_PORT:-4001}
      NODE_ENV: ${NODE_ENV:-development}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-1025}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-dev@fairgig.local}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-dev_password}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8081}
    ports:
      - "4001:4001"
    networks:
      - fairgig-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Earnings Service ────────────────────────────────────
  earnings-service:
    build:
      context: .
      dockerfile: services/earnings-service/Dockerfile
    container_name: fairgig-earnings-service
    restart: unless-stopped
    environment:
      EARNINGS_DB_URL: postgresql://earnings_svc:earnings_svc_secret_2026@postgres:5432/fairgig
      READONLY_DB_URL: postgresql://readonly_svc:readonly_svc_secret_2026@postgres:5432/fairgig
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      ANOMALY_SERVICE_URL: ${ANOMALY_SERVICE_URL:-http://anomaly-service:4003}
      EARNINGS_PORT: ${EARNINGS_PORT:-4002}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4002:4002"
    networks:
      - fairgig-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Anomaly Service ────────────────────────────────────
  anomaly-service:
    build:
      context: .
      dockerfile: services/anomaly-service/Dockerfile
    container_name: fairgig-anomaly-service
    restart: unless-stopped
    environment:
      READONLY_DB_URL: postgresql://readonly_svc:readonly_svc_secret_2026@postgres:5432/fairgig
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      ANOMALY_PORT: ${ANOMALY_PORT:-4003}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4003:4003"
    networks:
      - fairgig-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Grievance Service ──────────────────────────────────
  grievance-service:
    build:
      context: .
      dockerfile: services/grievance-service/Dockerfile
    container_name: fairgig-grievance-service
    restart: unless-stopped
    environment:
      GRIEVANCE_DB_URL: postgresql://grievance_svc:grievance_svc_secret_2026@postgres:5432/fairgig
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      GRIEVANCE_PORT: ${GRIEVANCE_PORT:-4004}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4004:4004"
    networks:
      - fairgig-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Analytics Service ─────────────────────────────────
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: fairgig-analytics-service
    restart: unless-stopped
    environment:
      ANALYTICS_DB_URL: postgresql://analytics_svc:analytics_svc_secret_2026@postgres:5432/fairgig
      READONLY_DB_URL: postgresql://readonly_svc:readonly_svc_secret_2026@postgres:5432/fairgig
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      NODE_ENV: ${NODE_ENV:-development}
      K_ANONYMITY_THRESHOLD: ${K_ANONYMITY_THRESHOLD:-5}
    ports:
      - "4005:4005"
    networks:
      - fairgig-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Certificate Service ────────────────────────────────
  certificate-service:
    build:
      context: .
      dockerfile: services/certificate-service/Dockerfile
    container_name: fairgig-certificate-service
    restart: unless-stopped
    environment:
      CERTIFICATE_DB_URL: postgresql://certificate_svc:certificate_svc_secret_2026@postgres:5432/fairgig
      READONLY_DB_URL: postgresql://readonly_svc:readonly_svc_secret_2026@postgres:5432/fairgig
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      AUTH_SERVICE_URL: http://auth-service:4001
      PORT: ${CERTIFICATE_PORT:-4006}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "4006:4006"
    networks:
      - fairgig-net
    depends_on:
      postgres:
        condition: service_healthy
